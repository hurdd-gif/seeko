name: Error Log Monitor

on:
  schedule:
    # Every 3 hours at :07 past the hour
    - cron: '7 */3 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Render error logs
        id: fetch-logs
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          echo "=== Fetching Render services ==="
          SERVICES=$(curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services?limit=20" || echo "FETCH_FAILED")

          if [ "$SERVICES" = "FETCH_FAILED" ]; then
            echo "error=Failed to fetch services from Render API" >> "$GITHUB_OUTPUT"
            echo "has_errors=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Find the seeko-studio service
          SERVICE_ID=$(echo "$SERVICES" | jq -r '.[] | select(.service.name == "seeko-studio") | .service.id // empty')

          if [ -z "$SERVICE_ID" ]; then
            # Try partial match
            SERVICE_ID=$(echo "$SERVICES" | jq -r '.[0].service.id // empty')
          fi

          if [ -z "$SERVICE_ID" ]; then
            echo "error=No Render service found" >> "$GITHUB_OUTPUT"
            echo "has_errors=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found service: $SERVICE_ID"

          # Fetch logs from the last 3 hours
          THREE_HOURS_AGO=$(date -u -d '3 hours ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-3H +%Y-%m-%dT%H:%M:%SZ)

          LOGS=$(curl -sf -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$SERVICE_ID/logs?limit=500" || echo "[]")

          # Filter for errors: 5xx, stack traces, unhandled exceptions
          ERROR_LOGS=$(echo "$LOGS" | jq -r '[.[] | select(
            (.message | test("(?i)(error|exception|unhandled|fatal|5[0-9]{2}|ECONNREFUSED|ETIMEDOUT|heap out of memory|killed|OOM)"; "x"))
          )] | if length > 0 then . else [] end')

          ERROR_COUNT=$(echo "$ERROR_LOGS" | jq 'length')
          echo "Found $ERROR_COUNT error log entries"

          if [ "$ERROR_COUNT" -gt 0 ]; then
            echo "has_errors=true" >> "$GITHUB_OUTPUT"
            # Save logs to file for next step
            echo "$ERROR_LOGS" | jq -r '.[0:20] | .[] | .message' > /tmp/error_logs.txt
          else
            echo "has_errors=false" >> "$GITHUB_OUTPUT"
            echo "No errors detected in the last 3 hours."
          fi

      - name: Analyze and create issue
        if: steps.fetch-logs.outputs.has_errors == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ERROR_SUMMARY=$(cat /tmp/error_logs.txt | head -50)
          REPORT_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Create a GitHub issue with error analysis
          gh issue create \
            --title "Error Log Monitor: $(date -u +%Y-%m-%d) — errors detected" \
            --label "automated-fix,bug" \
            --body "$(cat <<EOF
          ## Error Log Monitor Report

          **Date:** $REPORT_DATE
          **Source:** Render.com production logs

          ### Errors Detected

          \`\`\`
          $ERROR_SUMMARY
          \`\`\`

          ### Next Steps

          @claude Please analyze these error logs, trace them to the source code, identify root causes, and open a PR with fixes.

          ---
          *Automated by error-log-monitor workflow*
          EOF
          )"

      - name: Report healthy
        if: steps.fetch-logs.outputs.has_errors == 'false' && steps.fetch-logs.outputs.error == ''
        run: echo "No errors detected. Application health is good."
