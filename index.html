<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#eeeeee" />
    <!-- Pre-paint theme guard: resolve the stored preference before first
         paint so a dark load never flashes the light canvas. Three-state:
         'dark' | 'light' are explicit; anything else (including no key)
         means follow prefers-color-scheme. Mirrors src/lib/theme.ts (same
         key, same fallback-to-system rule) — keep in sync. The theme-color
         meta flips too so the browser chrome never mismatches the canvas. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('seeko-theme');
          var dark =
            stored === 'dark' ||
            (stored !== 'light' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (!dark) return;
          document.documentElement.classList.add('dark');
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', '#1f1f1f');
        } catch (e) {}
      })();
    </script>
    <!-- SVG first: the SEEKO "S", theme-adaptive (ink on light tab bars, #fafafa
         on dark). PNG fallback for browsers without SVG-favicon support. -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/icon-192.png" sizes="192x192" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Dashboard typography: one family; 600 carries the login heading and
         provider pills without faux-bold synthesis. Self-hosted (@font-face in
         globals.css) — Google Fonts cost two CHAINED third-party round trips
         (googleapis CSS, then gstatic woff2), which preconnect cannot collapse.
         `crossorigin` is required even same-origin: fonts always fetch in CORS
         mode, and without it the preload is discarded and fetched twice. -->
    <link
      rel="preload"
      href="/fonts/inter-latin-400-600.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <title>SEEKO Studio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/rr-app/main.tsx"></script>
  </body>
</html>
