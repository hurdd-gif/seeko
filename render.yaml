services:
  - type: web
    name: seeko-studio
    env: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PAYMENTS_ACCESS_HASH
        sync: false
      - key: PAYMENTS_JWT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  # Always-on page Render serves under www.seekostudios.com while the main
  # service (above) is in Maintenance Mode. Kept a SEPARATE service on purpose:
  # it must stay up when seeko-studio is down. No build — it publishes the
  # self-contained public/maintenance.html as-is. Wiring: paste this service's
  # URL (…/maintenance.html) into seeko-studio → Settings → Maintenance Mode →
  # Custom Maintenance Page URL. Render proxies that content under the app's own
  # domain, so the source URL is never user-visible. See public/maintenance.README.md.
  - type: web
    name: seeko-maintenance
    runtime: static
    staticPublishPath: ./public
    buildCommand: echo "no build — publishes public/maintenance.html as-is"
